<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Segoe UI, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #cba6f7;
    }
    p {
      font-size: 11px;
      color: #a6adc8;
      margin: 0 0 14px;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 8px;
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #b4befe; }
    #status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      color: #a6e3a1;
    }
    #status.error { color: #f38ba8; }
  </style>
</head>
<body>
  <h3>GMT Time Converter</h3>
  <p>Replaces times like <strong>10:28AM MDT</strong> on this page with their GMT equivalent.</p>
  <button id="convertBtn">Convert to GMT</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
