<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Segoe UI, sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 14px;
      color: #cba6f7;
    }
    p {
      font-size: 11px;
      color: #a6adc8;
      margin: 0 0 14px;
      line-height: 1.5;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #45475a;
      border-radius: 24px;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #cdd6f4;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider {
      background: #cba6f7;
    }
    input:checked + .slider::before {
      transform: translateX(18px);
    }
    #status {
      margin-top: 10px;
      font-size: 11px;
      text-align: center;
      min-height: 16px;
      color: #a6e3a1;
    }
    #status.error { color: #f38ba8; }
  </style>
</head>
<body>
  <h3>GMT Time Converter</h3>
  <p>Replaces times like <strong>10:28AM MDT</strong> on this page with their GMT equivalent.</p>
  <div class="toggle-row">
    <span>Auto-convert every 20s</span>
    <label class="switch">
      <input type="checkbox" id="toggleSwitch">
      <span class="slider"></span>
    </label>
  </div>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
